name: Refresh brokers

# Per-broker scorecard: 90-day funnel (leads presented → paid out) plus
# rejection breakdown, joined via Leads.CampaignId → Campaigns.SourceId.
# Writes brokers.json.

on:
  schedule:
    - cron: '35 6-23 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-brokers
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if already up to date
        id: guard
        run: |
          set -euo pipefail
          EXPECTED=$(date -u +%Y-%m-%d)
          if [ -f brokers.json ]; then
            CURRENT=$(python3 -c "import json; print(json.load(open('brokers.json')).get('snapshot_date',''))")
          else
            CURRENT=""
          fi
          echo "expected=$EXPECTED  current=$CURRENT"
          if [ "$CURRENT" = "$EXPECTED" ] && [ "${GITHUB_EVENT_NAME:-}" != "workflow_dispatch" ]; then
            echo "Snapshot already taken for $EXPECTED — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Microsoft ODBC Driver 18
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          source /etc/os-release
          curl -fsSL "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -o /tmp/packages-microsoft-prod.deb
          sudo dpkg -i /tmp/packages-microsoft-prod.deb
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Set up Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        if: steps.guard.outputs.skip != 'true'
        run: pip install --quiet pyodbc==5.*

      - name: Scan brokers
        if: steps.guard.outputs.skip != 'true'
        env:
          FABRIC_SQL_ENDPOINT: d76gbn5gtayeppltcrsxsvkluq-ruqkpz7fkwpelmnjh4kbg2lqpi.datawarehouse.fabric.microsoft.com
          FABRIC_TENANT_ID:    b760fc1f-98a6-4730-bd73-146579554ba4
          FABRIC_CLIENT_ID:    b8fb2709-6e42-4a1e-91e6-8a3807a9884d
          FABRIC_CLIENT_SECRET: ${{ secrets.FABRIC_CLIENT_SECRET }}
          BROKER_WINDOW_DAYS:  '90'
          BROKER_LENDER_ID:    '6'
        run: python scripts/scan_brokers.py

      - name: Commit if brokers.json changed
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add brokers.json
          if git diff --cached --quiet -- brokers.json; then
            echo "no changes — nothing to commit"
            exit 0
          fi
          SOURCES=$(python -c "import json; print(json.load(open('brokers.json'))['totals']['sources'])")
          PAID=$(python -c "import json; print(json.load(open('brokers.json'))['totals']['paid_out'])")
          git commit -m "Refresh brokers: 90-day funnel (${SOURCES} sources, ${PAID} paid)"
          for attempt in 1 2 3; do
            if git push; then break; fi
            if [ "$attempt" -eq 3 ]; then exit 1; fi
            git fetch origin main
            git rebase origin/main
          done

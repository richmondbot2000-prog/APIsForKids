name: Probe staff activity

# One-off probe: scans every reporting DB for tables with a ClientUsername
# column and writes the top distinct usernames per DB to
# staff-activity-probe.json. Manual-trigger only — used to discover the
# format of the username field before building the real enrichment.
#
# Delete this workflow + scripts/scan_staff_activity_probe.py once we've
# decided on the directory-enrichment design.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Microsoft ODBC Driver 18
        run: |
          set -euo pipefail
          source /etc/os-release
          curl -fsSL "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -o /tmp/packages-microsoft-prod.deb
          sudo dpkg -i /tmp/packages-microsoft-prod.deb
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install --quiet pyodbc==5.*

      - name: Probe
        env:
          FABRIC_SQL_ENDPOINT: d76gbn5gtayeppltcrsxsvkluq-ruqkpz7fkwpelmnjh4kbg2lqpi.datawarehouse.fabric.microsoft.com
          FABRIC_TENANT_ID:    b760fc1f-98a6-4730-bd73-146579554ba4
          FABRIC_CLIENT_ID:    b8fb2709-6e42-4a1e-91e6-8a3807a9884d
          FABRIC_CLIENT_SECRET: ${{ secrets.FABRIC_CLIENT_SECRET }}
        run: python scripts/scan_staff_activity_probe.py

      - name: Commit probe result
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add staff-activity-probe.json
          if git diff --cached --quiet; then
            echo "no changes — nothing to commit"
            exit 0
          fi
          git commit -m "Probe: staff-activity-probe.json (one-off)"
          for attempt in 1 2 3; do
            if git push; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Push failed after 3 attempts"
              exit 1
            fi
            git fetch origin main
            git rebase origin/main
          done

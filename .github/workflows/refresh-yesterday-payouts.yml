name: Refresh yesterday payouts

# Pulls yesterday's US payouts from the Fabric warehouse and commits
# yesterday-payouts.json back to main so the kids site stays current.
#
# We try every hour from 06:00–23:00 UTC instead of a single 06:00 slot
# because GitHub Actions cron is unreliable on free public repos
# (slots can be silently skipped during high load). The first step in
# the job is a guard that exits cleanly if today's run has already
# committed — so 17 of the 18 daily firings do almost no work.

on:
  schedule:
    - cron: '0 6-23 * * *'
  workflow_dispatch:        # manual trigger from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-yesterday-payouts
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if already up to date
        id: guard
        run: |
          set -euo pipefail
          EXPECTED=$(date -u -d 'yesterday' +%Y-%m-%d)
          if [ -f yesterday-payouts.json ]; then
            CURRENT=$(python3 -c "import json; print(json.load(open('yesterday-payouts.json')).get('target_date',''))")
          else
            CURRENT=""
          fi
          echo "expected_target_date=$EXPECTED  current_target_date=$CURRENT"
          if [ "$CURRENT" = "$EXPECTED" ]; then
            echo "Already refreshed for $EXPECTED — skipping the rest of the job."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Need to refresh: have '$CURRENT', want '$EXPECTED'."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Microsoft ODBC Driver 18
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          source /etc/os-release
          curl -fsSL "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -o /tmp/packages-microsoft-prod.deb
          sudo dpkg -i /tmp/packages-microsoft-prod.deb
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Set up Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        if: steps.guard.outputs.skip != 'true'
        run: pip install --quiet pyodbc==5.*

      - name: Scan
        if: steps.guard.outputs.skip != 'true'
        env:
          FABRIC_SQL_ENDPOINT: d76gbn5gtayeppltcrsxsvkluq-ruqkpz7fkwpelmnjh4kbg2lqpi.datawarehouse.fabric.microsoft.com
          FABRIC_TENANT_ID:    b760fc1f-98a6-4730-bd73-146579554ba4
          FABRIC_CLIENT_ID:    b8fb2709-6e42-4a1e-91e6-8a3807a9884d
          FABRIC_CLIENT_SECRET: ${{ secrets.FABRIC_CLIENT_SECRET }}
        run: python scripts/scan_yesterday_payouts.py

      - name: Commit if yesterday-payouts.json changed
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          if git diff --quiet -- yesterday-payouts.json; then
            echo "no changes — nothing to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add yesterday-payouts.json
          N=$(python -c "import json; d=json.load(open('yesterday-payouts.json')); print(d['totals']['borrowers'])")
          DATE=$(python -c "import json; d=json.load(open('yesterday-payouts.json')); print(d.get('target_date',''))")
          git commit -m "Refresh yesterday payouts: ${N} borrowers on ${DATE}"

          # If a sibling workflow (e.g. refresh-row-counts) committed in parallel,
          # the push will be rejected. Rebase onto the latest main and retry.
          for attempt in 1 2 3; do
            if git push; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Push failed after 3 attempts"
              exit 1
            fi
            echo "Push rejected (concurrent commit); rebasing and retrying (attempt $attempt)…"
            git fetch origin main
            git rebase origin/main
          done

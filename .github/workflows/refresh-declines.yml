name: Refresh declines

# Decline-reasons analysis over a rolling 90-day window: lead rejections
# from Leads.LeadResultTypeId + application-stage Flags (Decline / DNL /
# Cancelled / FraudRisk). Writes declines.json.

on:
  schedule:
    - cron: '50 6-23 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-declines
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if already up to date
        id: guard
        run: |
          set -euo pipefail
          EXPECTED=$(date -u +%Y-%m-%d)
          if [ -f declines.json ]; then
            CURRENT=$(python3 -c "import json; print(json.load(open('declines.json')).get('snapshot_date',''))")
          else
            CURRENT=""
          fi
          echo "expected=$EXPECTED  current=$CURRENT"
          if [ "$CURRENT" = "$EXPECTED" ] && [ "${GITHUB_EVENT_NAME:-}" != "workflow_dispatch" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Microsoft ODBC Driver 18
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          source /etc/os-release
          curl -fsSL "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -o /tmp/packages-microsoft-prod.deb
          sudo dpkg -i /tmp/packages-microsoft-prod.deb
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Set up Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        if: steps.guard.outputs.skip != 'true'
        run: pip install --quiet pyodbc==5.*

      - name: Scan declines
        if: steps.guard.outputs.skip != 'true'
        env:
          FABRIC_SQL_ENDPOINT: d76gbn5gtayeppltcrsxsvkluq-ruqkpz7fkwpelmnjh4kbg2lqpi.datawarehouse.fabric.microsoft.com
          FABRIC_TENANT_ID:    b760fc1f-98a6-4730-bd73-146579554ba4
          FABRIC_CLIENT_ID:    b8fb2709-6e42-4a1e-91e6-8a3807a9884d
          FABRIC_CLIENT_SECRET: ${{ secrets.FABRIC_CLIENT_SECRET }}
          DECLINE_WINDOW_DAYS:  '90'
          DECLINE_LENDER_ID:    '6'
        run: python scripts/scan_declines.py

      - name: Commit if declines.json changed
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add declines.json
          if git diff --cached --quiet -- declines.json; then
            echo "no changes — nothing to commit"
            exit 0
          fi
          LEAD_REJ=$(python -c "import json; print(json.load(open('declines.json'))['leads']['rejected'])")
          FLAG_DEC=$(python -c "import json; print(json.load(open('declines.json'))['flag_declines']['total'])")
          git commit -m "Refresh declines: ${LEAD_REJ} leads rejected, ${FLAG_DEC} app declines"
          for attempt in 1 2 3; do
            if git push; then break; fi
            if [ "$attempt" -eq 3 ]; then exit 1; fi
            git fetch origin main
            git rebase origin/main
          done
